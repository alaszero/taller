<!-- ══════════════════════════════════════════════════════════════════════════
     ALERTAS DEL SISTEMA  (yekflow + superusuario)
     ══════════════════════════════════════════════════════════════════════════ -->
{% if current_user and (current_user.nivel == 'yekflow' or current_user.nivel == 'superusuario') %}
<div class="card border-danger mb-4" id="cardAlertas">
  <div class="card-header bg-danger bg-opacity-10 d-flex align-items-center gap-2">
    <i class="bi bi-bell-fill text-danger fs-5"></i>
    <span class="fw-semibold">Alertas del Sistema</span>
    <span id="badgeAlertasAdmin" class="badge bg-danger ms-1" style="display:none;">0</span>
    <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="marcarTodasLeidas()">
      <i class="bi bi-check2-all me-1"></i>Marcar todas leídas
    </button>
    <button class="btn btn-sm btn-outline-danger" onclick="cargarAlertas()">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive" style="max-height:320px;overflow-y:auto;">
      <table class="table table-hover mb-0" id="tablaAlertas">
        <thead class="table-light">
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Mensaje</th>
            <th>Taller</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbodyAlertas">
          <tr><td colspan="5" class="text-center text-muted py-4">Cargando alertas…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script>
async function cargarAlertas(){
  try{
    const r = await fetch('/api/sistema/alertas?todas=1');
    const alertas = await r.json();
    const tbody = document.getElementById('tbodyAlertas');
    const badge = document.getElementById('badgeAlertasAdmin');
    if(!alertas.length){
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4"><i class="bi bi-check2-circle me-2 text-success"></i>Sin alertas activas</td></tr>';
      if(badge) badge.style.display='none';
      return;
    }
    const noLeidas = alertas.filter(a=>!a.leida).length;
    if(badge){ badge.textContent=noLeidas; badge.style.display=noLeidas?'':'none'; }
    const iconos = {stock_bajo:'bi-exclamation-triangle-fill text-warning', obra_detenida:'bi-pause-circle-fill text-danger'};
    tbody.innerHTML = alertas.map(a=>`
      <tr class="${a.leida?'text-muted':''}" id="alerta_${a.id}">
        <td><small>${(a.ts||'').substring(0,16)}</small></td>
        <td><i class="bi ${iconos[a.tipo]||'bi-bell'} me-1"></i><small>${a.tipo||''}</small></td>
        <td>${a.mensaje||''}</td>
        <td><small class="text-muted">${a.taller_id||''}</small></td>
        <td>${a.leida?'':`<button class="btn btn-xs btn-outline-secondary btn-sm" onclick="leerAlerta(${a.id})"><i class="bi bi-check2"></i></button>`}</td>
      </tr>`).join('');
  }catch(e){ console.error(e); }
}
async function leerAlerta(id){
  await fetch(`/api/sistema/alertas/${id}/leer`,{method:'POST'});
  cargarAlertas();
}
async function marcarTodasLeidas(){
  await fetch('/api/sistema/alertas/leer_todas',{method:'POST'});
  cargarAlertas();
}
document.addEventListener('DOMContentLoaded', cargarAlertas);
</script>
{% endif %}
