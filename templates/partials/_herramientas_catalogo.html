  <!-- Catálogo -->
  <div class="tab-pane fade" id="tabCatalogo">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Catálogo de herramientas</span>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-secondary" onclick="cargarCatalogo()" title="Actualizar">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
          <button class="btn btn-sm btn-outline-secondary" onclick="imprimirInventarioHerramientas()" title="Imprimir hoja de inventario físico">
            <i class="bi bi-printer me-1"></i>Imprimir inventario
          </button>
          <button class="btn btn-sm btn-primary" onclick="abrirModalHerramienta()">
            <i class="bi bi-plus-lg me-1"></i>Agregar herramienta
          </button>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover dt-table" id="tablaCatalogo">
            <thead><tr>
              <th>ID</th><th>Herramienta</th><th>Marca/Modelo</th><th>Categoría</th>
              <th>Ubicación</th><th>Estado</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<!-- Modal: Agregar Herramienta -->
<div class="modal fade" id="modalHerramienta" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Agregar Herramienta</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-4"><label class="form-label">ID</label>
            <div class="input-group">
              <input type="text" class="form-control font-monospace" id="hID" readonly
                title="Código generado automáticamente">
              <span class="input-group-text text-muted"><i class="bi bi-magic"></i></span>
            </div>
          </div>
          <div class="col-8"><label class="form-label">Herramienta *</label>
            <input type="text" class="form-control" id="hNombre">
          </div>
          <div class="col-4"><label class="form-label">Marca</label>
            <input type="text" class="form-control" id="hMarca">
          </div>
          <div class="col-4"><label class="form-label">Modelo</label>
            <input type="text" class="form-control" id="hModelo">
          </div>
          <div class="col-4"><label class="form-label">Tipo</label>
            <select class="form-select" id="hTipo">
              <option>Eléctrica</option><option>Neumática</option>
              <option>Medición</option><option>Manual</option>
            </select>
          </div>
          <div class="col-4"><label class="form-label">N/S</label>
            <input type="text" class="form-control" id="hNS">
          </div>
          <div class="col-4"><label class="form-label">Categoría</label>
            <select class="form-select" id="hCat">
              <option>Corte</option><option>Maquinado</option><option>Armado</option>
              <option>Acabado</option><option>Medición</option><option>General</option>
            </select>
          </div>
          <div class="col-4"><label class="form-label">Fecha alta</label>
            <input type="text" class="form-control datepicker" id="hFecha">
          </div>
          <div class="col-12"><label class="form-label">Observaciones</label>
            <input type="text" class="form-control" id="hObs">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarHerramienta()">
          <i class="bi bi-save me-1"></i>Guardar
        </button>
      </div>
    </div>
  </div>
</div>
