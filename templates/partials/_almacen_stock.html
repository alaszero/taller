  <!-- Stock actual -->
  <div class="tab-pane fade show active" id="tabStock">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <span>Stock actual por material</span>
          <select class="form-select form-select-sm w-auto" id="filtroTipoStock" onchange="renderStock()">
            <option value="">Todos los tipos</option>
            <option>Tablero</option>
            <option>Madera sólida</option>
            <option>Herraje</option>
            <option>Acabado</option>
            <option>Consumible</option>
            <option>Iluminación</option>
            <option>Otro</option>
          </select>
          <div class="input-group input-group-sm" style="width:220px;">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="buscarStock" placeholder="Buscar código o material..." oninput="renderStock()">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-secondary" onclick="cargarStock()" title="Actualizar">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
          <button class="btn btn-sm btn-outline-secondary" onclick="imprimirInventario()" title="Imprimir hoja de conteo físico">
            <i class="bi bi-printer me-1"></i>Imprimir inventario
          </button>
          <button class="btn btn-sm btn-primary" onclick="seleccionarTipoMovimiento()">
            <i class="bi bi-plus-lg me-1"></i>Registrar movimiento
          </button>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover dt-table" id="tablaStock">
            <thead><tr>
              <th>Código</th><th>Material</th><th>Unidad</th>
              <th>Stock mín.</th><th>Stock actual</th><th>Estado</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
