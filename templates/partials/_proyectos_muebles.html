  <!-- Muebles -->
  <div class="tab-pane fade" id="tabMuebles">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
          <span>Muebles por proyecto</span>
          <select class="form-select form-select-sm w-auto" id="filtroProyecto" onchange="filtrarMuebles()">
            <option value="">Todos los proyectos</option>
          </select>
        </div>
        <button class="btn btn-sm btn-primary" onclick="abrirModalMueble()">
          <i class="bi bi-plus-lg me-1"></i>Nuevo mueble
        </button>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover dt-table" id="tablaMuebles">
            <thead><tr>
              <th>ID Mueble</th><th>Proyecto</th><th>Mueble</th>
              <th>Cantidad</th><th>Tipo</th><th>Prioridad</th><th>Obs.</th><th></th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<!-- ══ Modal Mueble (Nuevo / Editar) ══ -->
<div class="modal fade" id="modalMueble" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalMuebleTitle">
          <i class="bi bi-grid me-2"></i>Nuevo Mueble
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label">ID Mueble</label>
            <div class="input-group">
              <input type="text" class="form-control font-monospace" id="mueID"
                title="Código generado automáticamente al crear. Editable en modo edición.">
              <span class="input-group-text text-muted" id="mueIDIcon"><i class="bi bi-magic"></i></span>
            </div>
          </div>
          <div class="col-6">
            <label class="form-label">Proyecto *</label>
            <select class="form-select" id="mueProyecto"></select>
          </div>
          <div class="col-12">
            <label class="form-label">Nombre mueble *</label>
            <input type="text" class="form-control" id="mueNombre">
          </div>
          <div class="col-4">
            <label class="form-label">Cantidad</label>
            <input type="number" class="form-control" id="mueCantidad" value="1" min="1">
          </div>
          <div class="col-4">
            <label class="form-label">Tipo</label>
            <input type="text" class="form-control" id="mueTipo">
          </div>
          <div class="col-4">
            <label class="form-label">Prioridad</label>
            <select class="form-select" id="mueArea">
              <option>Normal</option><option>Media</option><option>Alta</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Observación</label>
            <input type="text" class="form-control" id="mueObs">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" id="btnGuardarMueble" onclick="guardarMueble()">
          <i class="bi bi-save me-1"></i>Guardar
        </button>
      </div>
    </div>
  </div>
</div>
